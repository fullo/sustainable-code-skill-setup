name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-plugin/package-lock.json
      - name: Install dependencies
        run: cd mcp-plugin && npm ci
      - name: Build
        run: cd mcp-plugin && npm run build
      - name: Test
        run: cd mcp-plugin && npm test
      - name: Validate internal links
        run: |
          chmod +x scripts/validate-links.sh
          ./scripts/validate-links.sh
